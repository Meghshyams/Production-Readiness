name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate plugin structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required files..."
          files=(
            ".claude-plugin/plugin.json"
            ".claude-plugin/marketplace.json"
            "skills/production-readiness/SKILL.md"
            "README.md"
            "LICENSE"
            "CONTRIBUTING.md"
          )
          missing=0
          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "FAIL: Missing required file: $file"
              missing=1
            else
              echo "OK: $file"
            fi
          done
          if [ $missing -eq 1 ]; then
            exit 1
          fi
          echo "All required files present."

      - name: Validate plugin.json
        run: |
          echo "Validating plugin.json..."
          if ! python3 -c "import json; data = json.load(open('.claude-plugin/plugin.json')); assert 'name' in data, 'missing name'; assert 'description' in data, 'missing description'; print('OK: Valid JSON with required fields')"; then
            echo "FAIL: plugin.json is invalid"
            exit 1
          fi

      - name: Validate marketplace.json
        run: |
          echo "Validating marketplace.json..."
          if ! python3 -c "import json; data = json.load(open('.claude-plugin/marketplace.json')); assert 'plugins' in data, 'missing plugins'; print('OK: Valid JSON with required fields')"; then
            echo "FAIL: marketplace.json is invalid"
            exit 1
          fi

      - name: Validate SKILL.md has frontmatter
        run: |
          echo "Validating SKILL.md frontmatter..."
          head -1 skills/production-readiness/SKILL.md | grep -q "^---$" || { echo "FAIL: SKILL.md missing YAML frontmatter"; exit 1; }
          # Check that frontmatter closes
          awk 'NR>1 && /^---$/{found=1; exit} END{if(!found) exit 1}' skills/production-readiness/SKILL.md || { echo "FAIL: SKILL.md frontmatter not closed"; exit 1; }
          # Check required frontmatter fields
          sed -n '2,/^---$/p' skills/production-readiness/SKILL.md | grep -q "^name:" || { echo "FAIL: SKILL.md missing 'name' in frontmatter"; exit 1; }
          sed -n '2,/^---$/p' skills/production-readiness/SKILL.md | grep -q "^description:" || { echo "FAIL: SKILL.md missing 'description' in frontmatter"; exit 1; }
          echo "OK: SKILL.md has valid frontmatter with name and description"

      - name: Check SKILL.md has all 7 pillars
        run: |
          echo "Checking SKILL.md covers all pillars..."
          pillars=(
            "SECURITY"
            "CODE QUALITY"
            "TESTING"
            "ERROR HANDLING"
            "CONFIGURATION & BUILD"
            "VISUAL QA"
            "PERFORMANCE"
          )
          missing=0
          for pillar in "${pillars[@]}"; do
            if grep -qi "$pillar" skills/production-readiness/SKILL.md; then
              echo "OK: Found pillar — $pillar"
            else
              echo "FAIL: Missing pillar — $pillar"
              missing=1
            fi
          done
          if [ $missing -eq 1 ]; then
            exit 1
          fi
          echo "All 7 pillars present."

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            README.md
            CONTRIBUTING.md
